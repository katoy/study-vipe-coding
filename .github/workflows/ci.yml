name: CI/CD Pipeline

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Run Ruff (Format Check)
        run: uv run ruff format --check app tests

      - name: Run Ruff (Lint Check)
        run: uv run ruff check app tests

      - name: Run Mypy (Type Check)
        run: uv run mypy app

      - name: Install Playwright Browsers
        run: uv run playwright install --with-deps chromium

      - name: Run Pytest (Unit Tests & E2E Tests)
        # Provide environment variables for tests: allow pow disabled, rate limit low to exercise limiter, allow_origins set for CORS tests
        env:
          ALLOW_POW: "0"
          RATE_LIMIT_PER_MIN: "1000"
          ALLOW_ORIGINS: "http://localhost:8000"
        # 開発環境の pytest.ini (Playwright無効化) を上書きして全テストを実行
        run: uv run pytest -o addopts="" --cov=app --cov-report=xml

  docker-build-check:
    runs-on: ubuntu-latest
    needs: test-and-lint
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        
      - name: Build Docker Image
        run: docker build -t calculator-app:test .
