name: CI/CD Pipeline

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Run Ruff (Format Check)
        run: uv run ruff format --check app tests

      - name: Run Ruff (Lint Check)
        run: uv run ruff check app tests

      - name: Run Mypy (Type Check)
        run: uv run mypy app

      - name: Run Pytest (Unit Tests - faster)
        env:
          ALLOW_POW: "0"
          RATE_LIMIT_PER_MIN: "1000"
          ALLOW_ORIGINS: "http://localhost:8000"
        # Skip UI E2E tests in this job to reduce runtime; E2E run in separate job
        run: uv run pytest -o addopts="" --cov=app --cov-report=xml --ignore=tests/test_ui.py -q

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  docker-build-check:
    runs-on: ubuntu-latest
    needs: test-and-lint
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        
      - name: Build Docker Image
        run: docker build -t calculator-app:test .

  e2e:
    runs-on: ubuntu-latest
    needs: test-and-lint
    # Run E2E on pull requests and on main branch (or when manually triggered)
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        continue-on-error: true

      - name: Ensure repository checked out
        run: |
          if [ ! -d ".git" ]; then
            echo "actions/checkout failed; retrying clone via HTTPS"
            git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" .
            git fetch --all
            git checkout "${{ github.head_ref || github.ref_name || 'main' }}" || true
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pyproject.toml') }}

      - name: Install E2E test dependencies (inside uv environment)
        run: |
          # Ensure pip is available inside the virtual environment
          uv run python -m ensurepip --upgrade || true
          uv run python -m pip install --upgrade pip
          uv run python -m pip install pytest pytest-playwright playwright
          uv run playwright install --with-deps chromium

      - name: Start app
        run: |
          uv run uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          sleep 3

      - name: Run Playwright tests
        run: uv run pytest tests/test_ui.py -q

