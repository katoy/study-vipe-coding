<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>計算機</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/calculator.css">
  <script defer src="/static/htmx.min.js"></script>
  <script defer src="/static/calculator.js"></script>
</head>
<body>
<div class="calculator">
  <h1>計算機</h1>
  <form id="calc-form" role="form" aria-label="計算機フォーム" hx-post="/calculate" hx-target="#result" hx-swap="outerHTML" method="post" novalidate>
    <div class="display">
      <input type="text" name="expression" id="expression" value="{{ value if value is not none else expression or '' }}" aria-label="式入力" placeholder="式を入力" autocomplete="off" />
    </div>
    <div class="options">
      <div class="options-spacer">&nbsp;</div>
      <div id="fraction-preview">
        <!-- stacked fraction preview will be populated via HTMX OOB update -->
      </div>
    </div>
    <div class="hint">循環小数は 0.{3} と入力してください。</div>
    <div class="brace-row">
      <button type="button" class="btn-num brace-btn" aria-label="左波括弧" data-append="{">{</button>
      <button type="button" class="btn-num brace-btn" aria-label="右波括弧" data-append="}">}</button>
    </div>
    <div class="buttons">
      <button class="btn-clr btn-span2" type="button" aria-label="全消去" data-action="clear">AC</button>
      <button class="btn-op" type="button" aria-label="パーセント" data-append="%">%</button>
      <button class="btn-op" type="button" aria-label="割り算" data-append="/">÷</button>
      <button class="btn-num" type="button" aria-label="7" data-append="7">7</button>
      <button class="btn-num" type="button" aria-label="8" data-append="8">8</button>
      <button class="btn-num" type="button" aria-label="9" data-append="9">9</button>
      <button class="btn-op" type="button" aria-label="掛け算" data-append="*">×</button>
      <button class="btn-num" type="button" aria-label="4" data-append="4">4</button>
      <button class="btn-num" type="button" aria-label="5" data-append="5">5</button>
      <button class="btn-num" type="button" aria-label="6" data-append="6">6</button>
      <button class="btn-op" type="button" aria-label="引き算" data-append="-">−</button>
      <button class="btn-num" type="button" aria-label="1" data-append="1">1</button>
      <button class="btn-num" type="button" aria-label="2" data-append="2">2</button>
      <button class="btn-num" type="button" aria-label="3" data-append="3">3</button>
      <button class="btn-op" type="button" aria-label="足し算" data-append="+">+</button>
      <button class="btn-num" type="button" aria-label="0" data-append="0">0</button>
      <button class="btn-num btn-del" type="button" aria-label="一文字削除" data-action="delete">C</button>
      <button class="btn-num" type="button" aria-label="小数点" data-append=".">.</button>
      <button class="btn-eq" type="submit" aria-label="計算実行">=</button>
    </div>
    <div class="result" id="result" role="status" aria-live="polite" aria-atomic="true">{% if result %}{{ result }}{% endif %}</div>
  </form>
</div>
</body>
</html>
