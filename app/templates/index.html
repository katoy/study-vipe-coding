<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>計算機</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', 'Noto Sans JP', Arial, sans-serif; background: linear-gradient(180deg,#e8f0ff,#dbeafc); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .calculator { background: #ffffff; border-radius: 22px; box-shadow: 0 18px 48px rgba(6,18,35,0.14); padding: 30px; width: 340px; }
    h1 { text-align: center; font-size: 1.5rem; margin-bottom: 18px; color: #071127; font-weight:800; }
    .display { background: #031025; color: #f8fbff; border-radius: 16px; padding: 20px; font-size: 1.9rem; text-align: right; min-height: 68px; margin-bottom: 18px; word-break: break-all; box-shadow: inset 0 -8px 18px rgba(0,0,0,0.35); }
    .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    button { padding: 14px; border: none; border-radius: 12px; font-size: 1.05rem; cursor: pointer; transition: transform 0.12s ease, box-shadow 0.12s ease; box-shadow: 0 6px 14px rgba(4,10,20,0.06); }
    button:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(4,10,20,0.08); }
    button:active { transform: translateY(0); box-shadow: 0 6px 14px rgba(4,10,20,0.06); }

    /* High-contrast button styles */
    .btn-num { background: #f8fafc; color: #061826; font-weight:600; border: 2px solid rgba(6,24,38,0.10); box-shadow: inset 0 -2px 0 rgba(6,24,38,0.02); border-radius: 12px; }
    .btn-num:hover { box-shadow: 0 12px 28px rgba(6,24,38,0.10), inset 0 -2px 0 rgba(6,24,38,0.02); }
    .btn-op  { background: linear-gradient(180deg,#2738a6,#16256f); color: #fff; font-weight:700; }
    .btn-eq  { background: linear-gradient(180deg,#2e7d32,#13541e); color: #fff; font-weight:700; }
    .btn-clr { background: linear-gradient(180deg,#b71c1c,#7f0f0f); color: #fff; font-weight:700; }
    .btn-del { background: linear-gradient(180deg,#ff7043,#d84315); color: #fff; font-weight:700; }

    /* stronger focus/outline for accessibility */
    button:focus { outline: 3px solid rgba(37,99,235,0.18); outline-offset: 2px; }

    .btn-span2 { grid-column: span 2; }
    .result { text-align: center; margin-top: 16px; color: #b91c1c; font-size: 0.95rem; min-height: 20px; font-weight:600; }
  </style>
</head>
<body>
<div class="calculator">
  <h1>計算機</h1>
  <form id="calc-form" role="form" aria-label="計算機フォーム" hx-post="/calculate" hx-target="#result" hx-swap="outerHTML" method="post" novalidate>
    <div class="display">
      <input type="text" name="expression" id="expression" value="{{ expression or '' }}" aria-label="式入力" placeholder="式を入力" style="width:100%;font-size:1.6rem;background:transparent;border:none;color:#eee;outline:none;text-align:right;" autocomplete="off" />
    </div>
    <div class="options" style="display:flex;justify-content:space-between;gap:8px;margin:8px 0 12px;">
      <label style="font-size:0.95rem;color:#333;display:flex;align-items:center;gap:6px;">
        <input type="checkbox" name="show_fraction" id="show_fraction" {% if show_fraction %}checked{% endif %} /> 分数表示
      </label>
    </div>
    <div style="font-size:0.85rem;color:#555;margin-bottom:8px;">循環小数は 0.{3} と入力してください。</div>
    <div style="display:flex;gap:8px;margin-bottom:12px;">
      <button type="button" class="btn-num" onclick="appendToExpr('{')" style="padding:8px 12px;border-radius:8px;">{</button>
      <button type="button" class="btn-num" onclick="appendToExpr('}')" style="padding:8px 12px;border-radius:8px;">}</button>
    </div>
    <div class="buttons">
      <button class="btn-clr btn-span2" type="button" onclick="document.getElementById('expression').value='';document.getElementById('result').textContent='';">AC</button>
      <button class="btn-op" type="button" onclick="appendToExpr('%')">%</button>
      <button class="btn-op" type="button" onclick="appendToExpr('/')">÷</button>
      <button class="btn-num" type="button" onclick="appendToExpr('7')">7</button>
      <button class="btn-num" type="button" onclick="appendToExpr('8')">8</button>
      <button class="btn-num" type="button" onclick="appendToExpr('9')">9</button>
      <button class="btn-op" type="button" onclick="appendToExpr('*')">×</button>
      <button class="btn-num" type="button" onclick="appendToExpr('4')">4</button>
      <button class="btn-num" type="button" onclick="appendToExpr('5')">5</button>
      <button class="btn-num" type="button" onclick="appendToExpr('6')">6</button>
      <button class="btn-op" type="button" onclick="appendToExpr('-')">−</button>
      <button class="btn-num" type="button" onclick="appendToExpr('1')">1</button>
      <button class="btn-num" type="button" onclick="appendToExpr('2')">2</button>
      <button class="btn-num" type="button" onclick="appendToExpr('3')">3</button>
      <button class="btn-op" type="button" onclick="appendToExpr('+')">+</button>
      <button class="btn-num" type="button" onclick="appendToExpr('0')">0</button>
      <button class="btn-num btn-del" type="button" onclick="deleteLastChar()">C</button>
      <button class="btn-num" type="button" onclick="appendToExpr('.')">.</button>
      <button class="btn-eq" type="submit">=</button>
    </div>
    <div class="result" id="result" role="status" aria-live="polite" aria-atomic="true">{% if result %}{{ result }}{% endif %}</div>
  </form>
</div>
<script src="https://unpkg.com/htmx.org@1.9.10"></script>
<script>
function appendToExpr(val) {
  const input = document.getElementById('expression');
  input.value += val;
  input.focus();
}
function deleteLastChar() {
  const input = document.getElementById('expression');
  if (!input.value) return;
  input.value = input.value.slice(0, -1);
  input.focus();
}

// Convert repeating-decimal notation like 0.(3) or 1.2(34) into exact rational literal (num/den)
function convertRepeatingNotation(expr) {
  // regex: sign(optional), whole digits (may be empty), dot, nonrepeating digits (may be empty), (repeating digits)
  const re = /(-?)(\d*)\.(\d*)(?:\((\d+)\)|\{(\d+)\})/g;
  return expr.replace(re, function(_, sign, whole, nonrep, rep1, rep2) {
    // Use BigInt for exact arithmetic
    const rep = rep1 || rep2;
    const W = whole ? BigInt(whole) : 0n;
    const A = nonrep || '';
    const B = rep;
    const mlen = A.length;
    const nlen = B.length;
    const ten = (n) => 10n ** BigInt(n);
    let num, den;
    if (mlen > 0) {
      num = BigInt(A) * (ten(nlen) - 1n) + BigInt(B);
      den = ten(mlen) * (ten(nlen) - 1n);
    } else {
      num = BigInt(B);
      den = ten(nlen) - 1n;
    }
    let total = W * den + num;
    if (sign === '-') total = -total;
    return `(${total.toString()}/${den.toString()})`;
  });
}

// Intercept form submission to preprocess repeating decimals before sending
const form = document.getElementById('calc-form');
if (form) {
  form.addEventListener('submit', function(e) {
    const input = document.getElementById('expression');
    if (input && input.value) {
      input.value = convertRepeatingNotation(input.value);
    }
  });
}
</script>
</body>
</html>
